---
# Usage:
# ansible-playbook -i devops/ansible/hosts.yml devops/ansible/nas_fn.yml --vault-password-file ~/.ansible-vault/markpost-nas.pwd

- name: Deploy markpost
  hosts: fn
  user: "{{ user }}"
  gather_facts: no

  vars:
    app_name: markpost
    apps_path: "{{ home }}/docker"
    app_path: "{{ apps_path }}/{{ app_name }}"
    data_path: "{{ app_path }}/data"
    compose_file: "{{ app_path }}/docker-compose.yml"
    config_file: "{{ app_path }}/config.toml"

    signing_key: !vault |
      $ANSIBLE_VAULT;1.1;AES256
      39326461626239653238333463663836306466323238303262363331633833303534386162613539
      6130306636363166633063306330376462383861313238620a643166653963333239313539386133
      32646238343632333633653839313137366137613039633963396264376363393363623435343137
      3161646661373132350a363530373862363663636661376330353063383961396131643333663037
      33666264323161383735656537613962633361643439396566313731336430646639316534366661
      33633261366238363634303234343836353830346531623335353731373839616264636338356530
      39356636373333323161393434616465633034623738323030646232656363326634306235343632
      34353963363436336637

  tasks:
    - name: Ensure paths
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      loop:
        - "{{ apps_path }}"
        - "{{ app_path }}"
        - "{{ data_path }}"

    - name: Copy docker-compose.yml
      template:
        src: docker-compose_nas.yml.j2
        dest: "{{ compose_file }}"
        mode: "0644"

    - name: Copy config.toml
      template:
        src: config_nas.toml.j2
        dest: "{{ config_file }}"
        mode: "0600"

    - name: Stop containers
      community.docker.docker_compose_v2:
        project_src: "{{ app_path }}"
        state: absent

    - name: Pull images
      community.docker.docker_compose_v2:
        project_src: "{{ app_path }}"
        pull: always
        state: present

    - name: Start containers
      community.docker.docker_compose_v2:
        project_src: "{{ app_path }}"
        state: present
