services:
  backend:
    build:
      context: ..
      dockerfile: devops/backend.Dockerfile
    container_name: markpost-backend
    environment:
      - MARKPOST_SERVER__HOST=0.0.0.0
      - MARKPOST_DEBUG=true
      - MARKPOST_DB__DRIVER=postgresql
      - MARKPOST_DB__DSN=postgres://markpost:markpost@postgres:5432/markpost?sslmode=disable
      - MARKPOST_JWT__ACCESS_SIGNING_KEY=dev-access-secret-key-change-in-production
      - MARKPOST_JWT__REFRESH_SIGNING_KEY=dev-refresh-secret-key-change-in-production
    ports:
      - "7330:7330"
    volumes:
      - ../backend:/app:cached
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O /dev/null http://127.0.0.1:7330/api/v1/health || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    labels:
      - "com.docker.compose.project=markpost"

  postgres:
    image: postgres:17-alpine
    container_name: markpost-postgres
    ports:
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=markpost
      - POSTGRES_USER=markpost
      - POSTGRES_PASSWORD=markpost
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U markpost"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      - "com.docker.compose.project=markpost"

volumes:
  pgdata:
