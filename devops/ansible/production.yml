---
# Usage:
# ansible-playbook -i devops/ansible/hosts.yml devops/ansible/production.yml --vault-password-file ~/.ansible-vault/markpost-production.pwd

- name: Deploy markpost (production)
  hosts: ttyo
  user: "{{ user }}"
  gather_facts: no
  vars_files:
    - vars/production/vault.yml

  vars:
    app_name: markpost
    apps_path: "{{ home }}/docker"
    app_path: "{{ apps_path }}/{{ app_name }}"
    compose_file: "{{ app_path }}/docker-compose.yml"
    config_file: "{{ app_path }}/config.toml"
    caddyfile: "{{ app_path }}/Caddyfile"

    image_tag: "latest"
    app_port: 7157
    # Public origin URL (e.g. "https://markpost.cc"). Used for CORS allow_origins,
    # server.public_url, and the GitHub OAuth redirect_url.
    public_url: ""
    trusted_proxies: '["127.0.0.1", "::1"]'
    # Cloudflare CIDR list for Caddy trusted_proxies. Replace with the current
    # ranges from https://www.cloudflare.com/ips/ (IPv4 + IPv6, space-separated).
    cloudflare_cidrs: "private_ranges"
    # GitHub OAuth + Cloudflare purge credentials live in
    # vars/production/vault.yml (github_client_id, github_client_secret,
    # cloudflare_api_token, cloudflare_zone_id). Leaving them unset disables
    # OAuth and cache-tag purge respectively.

  tasks:
    - name: Ensure paths
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      loop:
        - "{{ apps_path }}"
        - "{{ app_path }}"
        - "{{ app_path }}/data"

    - name: Copy docker-compose.yml
      template:
        src: production/docker-compose.yml.j2
        dest: "{{ compose_file }}"
        mode: "0644"

    - name: Copy config.toml
      template:
        src: production/config.toml.j2
        dest: "{{ config_file }}"
        mode: "0600"

    - name: Copy Caddyfile
      template:
        src: production/Caddyfile.j2
        dest: "{{ caddyfile }}"
        mode: "0644"

    - name: Pull images
      community.docker.docker_compose_v2:
        project_src: "{{ app_path }}"
        pull: always
        state: present

    - name: Stop containers
      community.docker.docker_compose_v2:
        project_src: "{{ app_path }}"
        state: absent

    - name: Start containers
      community.docker.docker_compose_v2:
        project_src: "{{ app_path }}"
        state: present
