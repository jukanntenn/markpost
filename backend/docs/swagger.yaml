basePath: /
definitions:
  internal_api_rest_v1.AdminChannelItem:
    properties:
      configuration:
        $ref: '#/definitions/markpost_internal_domain_delivery.ChannelConfiguration'
      created_at:
        type: string
      enabled:
        type: boolean
      id:
        type: integer
      kind:
        type: string
      name:
        type: string
      user_id:
        type: integer
    type: object
  internal_api_rest_v1.AdminPostItem:
    properties:
      created_at:
        type: string
      qid:
        type: string
      title:
        type: string
      user_id:
        type: integer
      username:
        type: string
    type: object
  internal_api_rest_v1.AdminUserItem:
    properties:
      created_at:
        type: string
      email:
        type: string
      id:
        type: integer
      is_active:
        type: boolean
      role:
        type: string
      username:
        type: string
    type: object
  internal_api_rest_v1.AuthResponse:
    properties:
      expires_in:
        type: integer
      refresh_token:
        type: string
      token:
        type: string
      user:
        $ref: '#/definitions/internal_api_rest_v1.UserResponse'
    type: object
  internal_api_rest_v1.ChannelResponse:
    properties:
      configuration:
        $ref: '#/definitions/markpost_internal_domain_delivery.ChannelConfiguration'
      created_at:
        type: string
      enabled:
        type: boolean
      id:
        type: integer
      keywords:
        type: string
      kind:
        $ref: '#/definitions/markpost_internal_domain_delivery.ChannelKind'
      name:
        type: string
      updated_at:
        type: string
    type: object
  internal_api_rest_v1.ChannelsListResponse:
    properties:
      channels:
        items:
          $ref: '#/definitions/internal_api_rest_v1.ChannelResponse'
        type: array
    type: object
  internal_api_rest_v1.CreateDeliveryChannelRequest:
    properties:
      configuration:
        items:
          type: integer
        type: array
      keywords:
        type: string
      kind:
        type: string
      name:
        type: string
    required:
    - configuration
    - kind
    - name
    type: object
  internal_api_rest_v1.CreatePostResponse:
    properties:
      id:
        type: string
    type: object
  internal_api_rest_v1.GitHubLoginRequest:
    properties:
      code:
        type: string
      state:
        type: string
    required:
    - code
    - state
    type: object
  internal_api_rest_v1.HealthResponse:
    properties:
      status:
        type: string
    type: object
  internal_api_rest_v1.MessageResponse:
    properties:
      message:
        type: string
    type: object
  internal_api_rest_v1.OAuthURLResponse:
    properties:
      url:
        type: string
    type: object
  internal_api_rest_v1.PaginatedChannels:
    properties:
      channels:
        items:
          $ref: '#/definitions/internal_api_rest_v1.AdminChannelItem'
        type: array
      pagination:
        $ref: '#/definitions/internal_api_rest_v1.Pagination'
    type: object
  internal_api_rest_v1.PaginatedPosts:
    properties:
      pagination:
        $ref: '#/definitions/internal_api_rest_v1.Pagination'
      posts:
        items:
          $ref: '#/definitions/internal_api_rest_v1.AdminPostItem'
        type: array
    type: object
  internal_api_rest_v1.PaginatedUsers:
    properties:
      pagination:
        $ref: '#/definitions/internal_api_rest_v1.Pagination'
      users:
        items:
          $ref: '#/definitions/internal_api_rest_v1.AdminUserItem'
        type: array
    type: object
  internal_api_rest_v1.Pagination:
    properties:
      limit:
        type: integer
      page:
        type: integer
      total:
        type: integer
      total_pages:
        type: integer
    type: object
  internal_api_rest_v1.PasswordChangeRequest:
    properties:
      current_password:
        type: string
      new_password:
        minLength: 6
        type: string
    required:
    - current_password
    - new_password
    type: object
  internal_api_rest_v1.PostKeyResponse:
    properties:
      created_at:
        type: string
      post_key:
        type: string
    type: object
  internal_api_rest_v1.PostListItem:
    properties:
      created_at:
        type: string
      id:
        type: integer
      qid:
        type: string
      title:
        type: string
    type: object
  internal_api_rest_v1.PostRequest:
    properties:
      body:
        type: string
      title:
        type: string
    required:
    - body
    - title
    type: object
  internal_api_rest_v1.PostsListResponse:
    properties:
      pagination:
        $ref: '#/definitions/internal_api_rest_v1.Pagination'
      posts:
        items:
          $ref: '#/definitions/internal_api_rest_v1.PostListItem'
        type: array
    type: object
  internal_api_rest_v1.RefreshTokenRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  internal_api_rest_v1.RefreshTokenResponse:
    properties:
      expires_in:
        type: integer
      refresh_token:
        type: string
      token:
        type: string
    type: object
  internal_api_rest_v1.SingleChannelResponse:
    properties:
      channel:
        $ref: '#/definitions/internal_api_rest_v1.ChannelResponse'
    type: object
  internal_api_rest_v1.UpdateDeliveryChannelRequest:
    properties:
      configuration:
        items:
          type: integer
        type: array
      enabled:
        type: boolean
      keywords:
        type: string
      kind:
        type: string
      name:
        type: string
    type: object
  internal_api_rest_v1.UserResponse:
    properties:
      avatar_url:
        type: string
      email:
        type: string
      id:
        type: integer
      name:
        type: string
      role:
        type: string
      username:
        type: string
    type: object
  internal_api_rest_v1.UsernameLoginRequest:
    properties:
      password:
        type: string
      username:
        type: string
    required:
    - password
    - username
    type: object
  markpost_internal_domain_delivery.ChannelConfiguration:
    additionalProperties: {}
    type: object
  markpost_internal_domain_delivery.ChannelKind:
    enum:
    - feishu
    type: string
    x-enum-varnames:
    - ChannelKindFeishu
  markpost_pkg_apierr.ErrorResponse:
    properties:
      code:
        type: string
      errors:
        items:
          $ref: '#/definitions/markpost_pkg_apierr.FieldError'
        type: array
      message:
        type: string
    type: object
  markpost_pkg_apierr.FieldError:
    properties:
      code:
        type: string
      field:
        type: string
      message:
        type: string
    type: object
host: localhost:7330
info:
  contact: {}
  description: Markpost backend API for post management and delivery.
  title: Markpost API
  version: "1.0"
paths:
  /{id}:
    get:
      parameters:
      - description: Post QID
        in: path
        name: id
        required: true
        type: string
      - description: Response format (raw returns markdown)
        in: query
        name: format
        type: string
      produces:
      - text/html
      responses:
        "200":
          description: OK
          schema:
            type: string
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/markpost_pkg_apierr.ErrorResponse'
      summary: Render a post as HTML or raw markdown
      tags:
      - posts
  /{post_key}:
    post:
      consumes:
      - application/json
      parameters:
      - description: Post key used for authentication
        in: path
        name: post_key
        required: true
        type: string
      - description: Post title and markdown body
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_api_rest_v1.PostRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_api_rest_v1.CreatePostResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/markpost_pkg_apierr.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/markpost_pkg_apierr.ErrorResponse'
      summary: Create a new post with a post key
      tags:
      - posts
  /api/v1/admin/channels:
    get:
      parameters:
      - default: 1
        description: Page number (min 1)
        in: query
        name: page
        type: integer
      - default: 20
        description: Items per page (min 1)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api_rest_v1.PaginatedChannels'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/markpost_pkg_apierr.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/markpost_pkg_apierr.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List all delivery channels (admin)
      tags:
      - admin
  /api/v1/admin/posts:
    get:
      parameters:
      - description: Search keyword
        in: query
        name: search
        type: string
      - default: 1
        description: Page number (min 1)
        in: query
        name: page
        type: integer
      - default: 20
        description: Items per page (min 1)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api_rest_v1.PaginatedPosts'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/markpost_pkg_apierr.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/markpost_pkg_apierr.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List all posts (admin)
      tags:
      - admin
  /api/v1/admin/users:
    get:
      parameters:
      - default: 1
        description: Page number (min 1)
        in: query
        name: page
        type: integer
      - default: 20
        description: Items per page (min 1)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api_rest_v1.PaginatedUsers'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/markpost_pkg_apierr.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/markpost_pkg_apierr.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List all users (admin)
      tags:
      - admin
  /api/v1/auth/change-password:
    post:
      consumes:
      - application/json
      parameters:
      - description: Current and new password
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_api_rest_v1.PasswordChangeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api_rest_v1.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/markpost_pkg_apierr.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/markpost_pkg_apierr.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Change the current user's password
      tags:
      - auth
  /api/v1/auth/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: Login credentials
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_api_rest_v1.UsernameLoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api_rest_v1.AuthResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/markpost_pkg_apierr.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/markpost_pkg_apierr.ErrorResponse'
      summary: Login with username and password
      tags:
      - auth
  /api/v1/auth/logout:
    post:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api_rest_v1.MessageResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/markpost_pkg_apierr.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Logout the current user
      tags:
      - auth
  /api/v1/auth/refresh:
    post:
      consumes:
      - application/json
      parameters:
      - description: Refresh token
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_api_rest_v1.RefreshTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api_rest_v1.RefreshTokenResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/markpost_pkg_apierr.ErrorResponse'
      summary: Refresh authentication token
      tags:
      - auth
  /api/v1/delivery/channels:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api_rest_v1.ChannelsListResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/markpost_pkg_apierr.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List the current user's delivery channels
      tags:
      - delivery
    post:
      consumes:
      - application/json
      parameters:
      - description: Channel kind, name, configuration and keywords
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_api_rest_v1.CreateDeliveryChannelRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_api_rest_v1.SingleChannelResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/markpost_pkg_apierr.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/markpost_pkg_apierr.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create a delivery channel
      tags:
      - delivery
  /api/v1/delivery/channels/{id}:
    delete:
      parameters:
      - description: Channel ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api_rest_v1.MessageResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/markpost_pkg_apierr.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/markpost_pkg_apierr.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete a delivery channel
      tags:
      - delivery
    put:
      consumes:
      - application/json
      parameters:
      - description: Channel ID
        in: path
        name: id
        required: true
        type: integer
      - description: Channel fields to update
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_api_rest_v1.UpdateDeliveryChannelRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api_rest_v1.SingleChannelResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/markpost_pkg_apierr.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/markpost_pkg_apierr.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/markpost_pkg_apierr.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update a delivery channel
      tags:
      - delivery
  /api/v1/health:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api_rest_v1.HealthResponse'
      summary: Health check
      tags:
      - health
  /api/v1/oauth/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: GitHub OAuth code and state
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_api_rest_v1.GitHubLoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api_rest_v1.AuthResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/markpost_pkg_apierr.ErrorResponse'
      summary: Login with GitHub OAuth code
      tags:
      - oauth
  /api/v1/oauth/url:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api_rest_v1.OAuthURLResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/markpost_pkg_apierr.ErrorResponse'
      summary: Get GitHub OAuth authorization URL
      tags:
      - oauth
  /api/v1/post_key:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api_rest_v1.PostKeyResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/markpost_pkg_apierr.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get the current user's post key
      tags:
      - auth
  /api/v1/posts:
    get:
      parameters:
      - default: 1
        description: Page number (min 1)
        in: query
        name: page
        type: integer
      - default: 20
        description: Items per page (min 1)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api_rest_v1.PostsListResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/markpost_pkg_apierr.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List the current user's posts
      tags:
      - posts
securityDefinitions:
  BearerAuth:
    description: '"Bearer <access_token>"'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
