repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
      - id: end-of-file-fixer
  - repo: local
    hooks:
      - id: gofmt
        name: gofmt
        language: system
        entry: gofmt
        args: ["-s", "-w"]
        files: \.go$
        pass_filenames: true
