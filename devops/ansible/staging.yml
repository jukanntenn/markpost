---
# Usage:
# ansible-playbook -i devops/ansible/hosts.yml devops/ansible/staging.yml --vault-password-file ~/.ansible-vault/markpost-staging.pwd

- name: Deploy markpost (staging)
  hosts: oect
  user: "{{ user }}"
  gather_facts: no
  vars_files:
    - vars/staging/vault.yml

  vars:
    app_name: markpost
    apps_path: "{{ home }}/docker"
    app_path: "{{ apps_path }}/{{ app_name }}"
    compose_file: "{{ app_path }}/docker-compose.yml"
    config_file: "{{ app_path }}/config.toml"

    registry: "192.168.5.50:5000"
    backend_image: markpost
    frontend_image: markpost-web
    image_tag: "latest"
    backend_port: 7330
    frontend_port: 8089
    public_url: ""
    trusted_proxies: "[\"127.0.0.1\", \"::1\"]"
    debug: "false"
    postgres_port: 5432
    postgres_db: markpost
    postgres_user: markpost

  tasks:
    - name: Ensure paths
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      loop:
        - "{{ apps_path }}"
        - "{{ app_path }}"

    - name: Copy docker-compose.yml
      template:
        src: staging/docker-compose.yml.j2
        dest: "{{ compose_file }}"
        mode: "0644"

    - name: Copy config.toml
      template:
        src: staging/config.toml.j2
        dest: "{{ config_file }}"
        mode: "0600"

    - name: Stop containers
      community.docker.docker_compose_v2:
        project_src: "{{ app_path }}"
        state: absent

    - name: Pull images
      community.docker.docker_compose_v2:
        project_src: "{{ app_path }}"
        pull: always
        state: present

    - name: Start containers
      community.docker.docker_compose_v2:
        project_src: "{{ app_path }}"
        state: present
