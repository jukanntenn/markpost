debug = false

[server]
host = "127.0.0.1"
port = 7330
trusted_proxies = ["127.0.0.1", "::1", "localhost"]

[db]
driver = "sqlite"
dsn = "file:./data/markpost.db?_foreign_keys=on&_journal_mode=WAL"

[admin]
initial_username = "markpost"
initial_password = "markpost"

[post]
title_max_length = 150
body_max_bytes = 32768
retention_days = 7

[cors]
allow_origins = ["*"]
allow_headers = ["Content-Type", "Authorization", "X-OAuth-State"]

[oauth.github]
client_id = ""
client_secret = ""
redirect_uri = "http://localhost:7330/ui/login/callback"

[jwt]
access_signing_key = "3e9ae84293f4e5334642f91de3d1453b1eed0ec56af53b97ae68ce50cae9d1ec"
refresh_signing_key = "e4b6318f5f2f13a2a6f8ef33c820f0910d9f0b8d4cc8c1d8645749d43b62a5d1"
access_token_expire = "24h"
refresh_token_expire = "720h"

[ratelimit]
per_second = 1
burst = 5
