---
# production (ttyo @ 43.133.160.29) — the SaaS origin behind Cloudflare.
# Caddy serves HTTPS on 2053 with a Cloudflare Origin CA certificate; the
# visitor-facing edge port is 443 (terminated at Cloudflare), and an Origin Rule
# rewrites the destination port to 2053.

env: production
image_tag: latest
image: "jukanntenn/markpost:{{ image_tag }}"

public_url: "https://markpost.cc"
trusted_proxies: '["127.0.0.1", "::1"]'

host_port: 2053
tls_profile: origin
caddyfile_template: Caddyfile.production.j2
debug: false

# Cloudflare CIDR ranges for Caddy trusted_proxies. Sync from
# https://www.cloudflare.com/ips/ (IPv4 + IPv6, space-separated).
cloudflare_cidrs: "173.245.48.0/20 103.21.244.0/22 103.22.200.0/22 103.31.4.0/22 141.101.64.0/18 108.162.192.0/18 190.93.240.0/20 188.114.96.0/20 197.234.240.0/22 198.41.128.0/17
  162.158.0.0/15 104.16.0.0/13 104.24.0.0/14 172.64.0.0/13 131.0.72.0/22"
cloudflare_zone_id: 63edf965a56621e7982cce517cf2e219

app_dirs:
  - "{{ apps_path }}"
  - "{{ app_path }}"
  - "{{ app_path }}/data"
  - "{{ app_path }}/certs"
