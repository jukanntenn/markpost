<!DOCTYPE html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="color-scheme" content="light dark">
        <title>{{.Title}}</title>
        <style>
        :root {
            --bg: #f6f7f9;
            --paper: #ffffff;
            --text: #0f172a;
            --muted: #475569;
            --border: #e5e7eb;
            --link: #2563eb;
            --link-hover: #1d4ed8;
            --code-bg: #f1f5f9;
            --pre-bg: #f8fafc;
            --pre-text: #0f172a;
            --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
            --radius: 16px;
        }

        * {
            box-sizing: border-box;
        }

        html {
            -webkit-text-size-adjust: 100%;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", system-ui, sans-serif;
            color: var(--text);
            background: var(--bg);
            line-height: 1.85;
            font-size: 18px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
        }

        .page {
            min-height: 100vh;
            padding: clamp(20px, 4vw, 56px) 16px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: min(80ch, 100%);
            background: var(--paper);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: clamp(22px, 4vw, 48px);
            overflow-wrap: anywhere;
        }

        .post-header {
            padding-bottom: 18px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 28px;
        }

        .post-title {
            margin: 0;
            font-size: clamp(28px, 3.2vw, 40px);
            line-height: 1.2;
            letter-spacing: -0.02em;
        }

        .content > :first-child {
            margin-top: 0;
        }

        .content > :last-child {
            margin-bottom: 0;
        }

        .content p {
            margin: 1rem 0;
            color: var(--text);
            text-align: left;
            line-break: strict;
        }

        .content a {
            color: var(--link);
            text-decoration: underline;
            text-decoration-thickness: from-font;
            text-underline-offset: 0.2em;
        }

        .content a:hover {
            color: var(--link-hover);
        }

        .content h1,
        .content h2,
        .content h3,
        .content h4,
        .content h5,
        .content h6 {
            margin: 2.25rem 0 0.9rem;
            line-height: 1.25;
            letter-spacing: -0.01em;
        }

        .content h1 {
            font-size: 1.75rem;
        }

        .content h2 {
            font-size: 1.45rem;
        }

        .content h3 {
            font-size: 1.2rem;
        }

        .content h4 {
            font-size: 1.05rem;
            color: var(--muted);
        }

        .content ul,
        .content ol {
            margin: 1rem 0;
            padding-left: 1.4em;
        }

        .content li {
            margin: 0.35rem 0;
        }

        .content blockquote {
            margin: 1.5rem 0;
            padding: 0.85rem 1rem;
            color: var(--muted);
            border-left: 3px solid var(--border);
            background: #f8fafc;
            border-radius: 10px;
        }

        .content code {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            font-size: 0.92em;
            background: var(--code-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0.12em 0.35em;
            overflow-wrap: anywhere;
        }

        .content pre {
            margin: 1.5rem 0;
            padding: 16px 18px;
            background: var(--pre-bg);
            color: var(--pre-text);
            border-radius: 12px;
            overflow-x: auto;
            border: 1px solid var(--border);
        }

        .content pre code {
            background: transparent;
            border: none;
            padding: 0;
            font-size: 0.9em;
            color: inherit;
        }

        .content table {
            display: block;
            overflow-x: auto;
            width: 100%;
            border-collapse: collapse;
            margin: 1.5rem 0;
            font-size: 0.95em;
        }

        .content th,
        .content td {
            border: 1px solid var(--border);
            padding: 0.65rem 0.75rem;
            text-align: left;
            vertical-align: top;
            overflow-wrap: anywhere;
        }

        .content th {
            background: #f8fafc;
            color: var(--muted);
            font-weight: 600;
        }

        .content img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 1.5rem auto;
            border-radius: 12px;
        }

        .content hr {
            border: none;
            border-top: 1px solid var(--border);
            margin: 2.25rem 0;
        }

        @media (max-width: 768px) {
            body {
                font-size: 16px;
            }

            .page {
                padding: 20px 14px;
            }

            .container {
                border-radius: 14px;
                padding: 22px 18px;
            }
        }

        @media (min-width: 1200px) {
            .container {
                width: min(94ch, 100%);
            }
        }

        @media (max-width: 480px) {
            .container {
                border-radius: 12px;
                padding: 20px 16px;
            }
        }

        :focus-visible {
            outline: 2px solid rgba(37, 99, 235, 0.6);
            outline-offset: 3px;
            border-radius: 6px;
        }

        ::selection {
            background: rgba(37, 99, 235, 0.18);
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                scroll-behavior: auto;
            }
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0b1220;
                --paper: #0f172a;
                --text: #e5e7eb;
                --muted: #a1a1aa;
                --border: rgba(148, 163, 184, 0.22);
                --link: #93c5fd;
                --link-hover: #bfdbfe;
                --code-bg: rgba(148, 163, 184, 0.14);
                --pre-bg: #020617;
                --pre-text: #e2e8f0;
                --shadow: 0 0 0 rgba(0, 0, 0, 0);
            }

            .content blockquote {
                background: rgba(148, 163, 184, 0.08);
                border-left-color: rgba(148, 163, 184, 0.35);
            }

            .content th {
                background: rgba(148, 163, 184, 0.08);
            }
        }

        .post-footer {
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
            text-align: center;
        }

        .post-footer a {
            font-size: 0.85rem;
            color: var(--muted);
            opacity: 0.6;
            text-decoration: none;
            transition: opacity 0.2s;
        }

        .post-footer a:hover {
            opacity: 1;
        }

        @media print {
            body {
                background: #ffffff;
                font-size: 12pt;
            }

            .page {
                padding: 0;
            }

            .container {
                width: 100%;
                border: none;
                box-shadow: none;
                padding: 0;
            }

            .content a {
                color: #000000;
            }

            .content pre {
                background: #ffffff;
                color: #000000;
                border: 1px solid #dddddd;
            }

            .content pre code {
                color: #000000;
            }

            .post-footer {
                display: none;
            }
        }
        </style>
    </head>
    <body>
        <main class="page">
            <article class="container">
                <header class="post-header">
                    <h1 class="post-title">{{.Title}}</h1>
                </header>
                <div class="content">{{.Body}}</div>
                <footer class="post-footer">
                    <a href="/dashboard">Powered by Markpost</a>
                </footer>
            </article>
        </main>
    </body>
</html>
