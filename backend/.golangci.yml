# golangci-lint configuration
# Documentation: https://golangci-lint.run/usage/configuration/

version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: "none"
  enable:
    - errcheck
    - unused
    - staticcheck
    - ineffassign
    - govet
    - revive

  settings:
    errcheck:
      check-type-assertions: true
      check-blank: false
      exclude-functions:
        - "(*os.File).Close"
        - "(*os.File).Sync"
        - "os.Remove"
        - "os.RemoveAll"
        - "os.Rename"
        - "(*bufio.Writer).Flush"
        - "(*os.File).Truncate"

    staticcheck:
      checks: ["all", "-SA9004"]

    revive:
      confidence: 0.8

  exclusions:
    rules:
      - linters: [revive]
        text: "package-comments:"
      - linters: [revive]
        text: "exported:"
      - linters: [revive]
        text: "var-naming:"
      - linters: [revive]
        text: "unused-parameter:"
      - linters: [revive]
        text: "stutters"
      - path: _test\.go
        linters: [errcheck, revive, staticcheck]
      - text: "SA1019:"
        linters: [staticcheck]

formatters:
  enable:
    - gofmt
    - goimports

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  new: false

output:
  formats:
    text:
      colors: true
      print-issued-lines: true
      print-linter-name: true
